<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>тЬж our little corner тЬж</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --midnight: #0b0f1a;
    --deep:     #0f1628;
    --navy:     #141e35;
    --panel:    #1a2540;
    --border:   rgba(255,255,255,0.07);
    --gold:     #c9923f;
    --gold-soft:#e8b870;
    --gold-glow:rgba(201,146,63,0.18);
    --snow:     #eef2f8;
    --snow-dim: rgba(238,242,248,0.55);
    --red:      #8b2020;
    --green:    #1a3d2b;
    --green-soft:#2e6649;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body:    'Inter', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--midnight);
    color: var(--snow);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* тФАтФА SNOWFALL тФАтФА */
  #snow-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
  }

  /* тФАтФА LAYOUT тФАтФА */
  #app {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 16px;
  }

  /* тФАтФА GATE SCREEN тФАтФА */
  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    max-width: 440px;
    width: 100%;
    animation: fadeUp 0.9s ease both;
  }

  .gate-title {
    font-family: var(--font-display);
    font-size: 2.8rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--snow);
    text-align: center;
    line-height: 1.15;
  }
  .gate-title em {
    font-style: italic;
    color: var(--gold-soft);
  }
  .gate-sub {
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--snow-dim);
    text-align: center;
    margin-top: -14px;
  }

  .key-box {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .key-box label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--snow-dim);
  }
  .key-box input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--snow);
    font-family: var(--font-body);
    font-size: 0.88rem;
    letter-spacing: 0.06em;
    outline: none;
    transition: border-color 0.2s;
  }
  .key-box input:focus { border-color: var(--gold); }
  .key-box input::placeholder { color: rgba(238,242,248,0.2); }

  .name-row {
    display: flex;
    gap: 10px;
  }
  .name-row input { flex: 1; }

  #gate-btn {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--gold) 0%, #a0702a 100%);
    color: #fff;
    font-family: var(--font-body);
    font-size: 0.82rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  #gate-btn:hover { opacity: 0.88; }
  #gate-btn:active { transform: scale(0.98); }

  #gate-error {
    font-size: 0.8rem;
    color: #e07070;
    text-align: center;
    min-height: 1.2em;
  }

  /* тФАтФА CHAT SCREEN тФАтФА */
  #chat {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 660px;
    height: min(92vh, 820px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,146,63,0.07);
    animation: fadeUp 0.6s ease both;
  }

  /* header */
  .chat-header {
    padding: 18px 24px;
    background: var(--deep);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .chat-header-left { display: flex; align-items: center; gap: 12px; }
  .header-orb {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, #5a3010 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .header-name {
    font-family: var(--font-display);
    font-size: 1.22rem;
    font-weight: 300;
    letter-spacing: 0.03em;
    color: var(--snow);
  }
  .header-status {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green-soft);
    margin-top: 1px;
  }
  .header-status.offline { color: #666; }

  .chat-header-right {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--snow-dim);
    cursor: pointer;
    transition: color 0.2s;
  }
  .chat-header-right:hover { color: var(--gold-soft); }

  /* decorative pine branch divider */
  .branch-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 20px 0;
    opacity: 0.35;
    flex-shrink: 0;
  }
  .branch-divider span { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--green-soft); }
  .branch-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--green-soft), transparent); }

  /* messages area */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

  /* date chip */
  .date-chip {
    align-self: center;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--snow-dim);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    margin: 6px 0;
  }

  /* bubble */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 72%;
    gap: 3px;
    animation: msgIn 0.25s ease both;
  }
  .msg.mine  { align-self: flex-end; align-items: flex-end; }
  .msg.theirs { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 15px;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.55;
    word-break: break-word;
  }
  .mine .bubble {
    background: linear-gradient(135deg, #8b2020 0%, #6a1818 100%);
    border-bottom-right-radius: 4px;
    color: #f7e8e8;
  }
  .theirs .bubble {
    background: var(--navy);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--snow);
  }

  .msg-meta {
    font-size: 0.67rem;
    color: rgba(238,242,248,0.28);
    letter-spacing: 0.06em;
    display: flex; gap: 6px; align-items: center;
  }
  .msg-meta .sender { color: var(--gold-soft); opacity: 0.7; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--snow-dim);
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-style: italic;
    font-weight: 300;
    text-align: center;
    opacity: 0.6;
    padding: 40px;
  }
  .empty-state .snowflake-big { font-size: 2.4rem; opacity: 0.4; }

  /* input area */
  .chat-footer {
    padding: 16px 18px;
    background: var(--deep);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 15px;
    color: var(--snow);
    font-family: var(--font-body);
    font-size: 0.9rem;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: rgba(201,146,63,0.5); }
  #msg-input::placeholder { color: rgba(238,242,248,0.18); }

  #send-btn {
    width: 42px; height: 42px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--gold) 0%, #7a4c18 100%);
    color: #fff;
    font-size: 1.05rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.93); }

  /* тФАтФА ANIMATIONS тФАтФА */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* тФАтФА ORNAMENT DOTS тФАтФА */
  .ornaments {
    display: flex; gap: 10px; align-items: center; justify-content: center;
    font-size: 0.85rem; opacity: 0.5; color: var(--gold-soft);
  }

  @media (max-width: 520px) {
    .gate-title { font-size: 2rem; }
    #chat { border-radius: 14px; height: 96vh; }
    .msg { max-width: 85%; }
  }
</style>
</head>
<body>

<canvas id="snow-canvas"></canvas>

<div id="app">

  <!-- GATE -->
  <div id="gate">
    <div>
      <div class="gate-title">our <em>little</em> corner</div>
      <div class="gate-sub">тЭД a quiet place just for us тЭД</div>
    </div>
    <div class="ornaments">тЬж тЬж тЬж</div>
    <div class="key-box">
      <label>your name</label>
      <input type="text" id="name-input" placeholder="enter your nameтАж" maxlength="24" autocomplete="off" />
      <label>secret key</label>
      <input type="password" id="key-input" placeholder="paste the key hereтАж" autocomplete="off" />
      <button id="gate-btn">enter тЬж</button>
      <div id="gate-error"></div>
    </div>
    <div class="ornaments" style="font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; opacity:0.3; color:var(--snow-dim);">end-to-end encrypted ┬╖ just the two of you</div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="header-orb">ЁЯХп</div>
        <div>
          <div class="header-name">our little corner</div>
          <div class="header-status offline" id="conn-status">connectingтАж</div>
        </div>
      </div>
      <div class="chat-header-right" id="logout-btn">leave тЬж</div>
    </div>
    <div class="branch-divider"><div class="branch-line"></div><span>ЁЯМ▓ тЬж ЁЯМ▓</span><div class="branch-line"></div></div>
    <div id="messages">
      <div class="empty-state" id="empty-state">
        <div class="snowflake-big">тЭД</div>
        <div>say hello when you're readyтАж</div>
      </div>
    </div>
    <div class="chat-footer">
      <textarea id="msg-input" rows="1" placeholder="write something warmтАж"></textarea>
      <button id="send-btn">тЮд</button>
    </div>
  </div>

</div>

<script>
// тФАтФА SNOWFALL тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
(function(){
  const canvas = document.getElementById('snow-canvas');
  const ctx = canvas.getContext('2d');
  let flakes = [];
  const N = 90;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const CHARS = ['тЭД','тЬж','тЭЕ','┬╖','тАв','тЬ╝'];
  for(let i=0;i<N;i++){
    flakes.push({
      x: Math.random()*window.innerWidth,
      y: Math.random()*window.innerHeight,
      s: 0.4+Math.random()*1.2,
      sp: 0.25+Math.random()*0.5,
      drift: (Math.random()-0.5)*0.3,
      ch: CHARS[Math.floor(Math.random()*CHARS.length)],
      a: 0.15+Math.random()*0.45
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    flakes.forEach(f=>{
      ctx.save();
      ctx.globalAlpha = f.a;
      ctx.fillStyle = '#eef2f8';
      ctx.font = `${f.s*14}px serif`;
      ctx.fillText(f.ch, f.x, f.y);
      ctx.restore();
      f.y += f.sp;
      f.x += f.drift;
      if(f.y > canvas.height+20) { f.y=-20; f.x=Math.random()*canvas.width; }
      if(f.x > canvas.width+20) f.x=-10;
      if(f.x < -20) f.x=canvas.width+10;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// тФАтФА CRYPTO HELPERS тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const SECRET_KEY = "w9Xk2mP7qLrN4sT8vYdH1jFbCeGaUoZ5nQiWxRtBhMlVpKcDyEgOuAsSfJzI3w6"; // тЖР YOUR KEY

async function getAESKey(rawKey) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(rawKey.substring(0,32).padEnd(32,'0')),
    "AES-GCM", false, ["encrypt","decrypt"]
  );
  return keyMaterial;
}

async function encrypt(text, rawKey) {
  const key = await getAESKey(rawKey);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct  = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, enc.encode(text));
  const buf = new Uint8Array(iv.byteLength + ct.byteLength);
  buf.set(iv, 0);
  buf.set(new Uint8Array(ct), iv.byteLength);
  return btoa(String.fromCharCode(...buf));
}

async function decrypt(b64, rawKey) {
  const key = await getAESKey(rawKey);
  const buf = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const iv  = buf.slice(0,12);
  const ct  = buf.slice(12);
  const pt  = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return new TextDecoder().decode(pt);
}

// тФАтФА APP STATE тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
let myName   = '';
let userKey  = '';
let gun      = null;
let chatNode = null;
let seenIds  = new Set();

// тФАтФА GATE LOGIC тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const gateEl    = document.getElementById('gate');
const chatEl    = document.getElementById('chat');
const nameInput = document.getElementById('name-input');
const keyInput  = document.getElementById('key-input');
const gateBtn   = document.getElementById('gate-btn');
const gateError = document.getElementById('gate-error');

gateBtn.addEventListener('click', enterChat);
keyInput.addEventListener('keydown', e => { if(e.key==='Enter') enterChat(); });
nameInput.addEventListener('keydown', e => { if(e.key==='Enter') keyInput.focus(); });

function enterChat() {
  const name = nameInput.value.trim();
  const key  = keyInput.value.trim();
  gateError.textContent = '';

  if(!name) { gateError.textContent = 'please enter your name'; return; }
  if(!key)  { gateError.textContent = 'please enter the secret key'; return; }
  if(key !== SECRET_KEY) { gateError.textContent = 'that key doesn\'t seem right тЬж try again'; return; }

  myName  = name;
  userKey = key;

  gateEl.style.display = 'none';
  chatEl.style.display = 'flex';
  initGun();
}

// тФАтФА GUN.JS SETUP тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function initGun() {
  // Use a hashed version of the key as the channel name (so it's opaque to observers)
  const channelHash = btoa(SECRET_KEY).replace(/[^a-zA-Z0-9]/g,'').substring(0,32);

  gun = Gun(['https://gun-manhattan.herokuapp.com/gun',
             'https://gun-us.herokuapp.com/gun']);

  chatNode = gun.get('corner_' + channelHash);

  const statusEl = document.getElementById('conn-status');
  setTimeout(()=>{ statusEl.textContent='connected тЬж'; statusEl.classList.remove('offline'); }, 1500);

  // Listen for messages
  chatNode.map().on(async (data, id) => {
    if(!data || !data.ct || seenIds.has(id)) return;
    seenIds.add(id);

    try {
      const plain = await decrypt(data.ct, userKey);
      const msg   = JSON.parse(plain);
      renderMessage(msg, id);
    } catch(e) {
      // ignore undecryptable (wrong key) messages
    }
  });
}

// тФАтФА SEND тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const sendBtn  = document.getElementById('send-btn');
const msgInput = document.getElementById('msg-input');

sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

async function sendMessage() {
  const text = msgInput.value.trim();
  if(!text || !chatNode) return;
  msgInput.value = '';
  msgInput.style.height = 'auto';

  const payload = JSON.stringify({ text, sender: myName, ts: Date.now() });
  const ct = await encrypt(payload, userKey);

  const id = Date.now() + '_' + Math.random().toString(36).slice(2,8);
  chatNode.get(id).put({ ct });
}

// тФАтФА RENDER тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const messagesEl   = document.getElementById('messages');
const emptyStateEl = document.getElementById('empty-state');
let lastDateLabel  = '';

  const date = new Date(msg.ts);
  const dateLabel = date.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });

  if(dateLabel !== lastDateLabel) {
    lastDateLabel = dateLabel;
    const chip = document.createElement('div');
    chip.className = 'date-chip';
    chip.textContent = dateLabel;
    messagesEl.appendChild(chip);
  }

  bubble.className = 'bubble';
  bubble.textContent = msg.text;

  meta.className = 'msg-meta';
