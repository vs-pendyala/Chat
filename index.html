<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✦ our little corner ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<canvas id="snow-canvas"></canvas>

<div id="app">

  <!-- GATE -->
  <div id="gate">
    <div class="gate-top">
      <div class="gate-title">our <em>little</em> corner</div>
      <div class="gate-sub">❄ a quiet place just for us ❄</div>
    </div>
    <div class="ornaments">✦ ✦ ✦</div>
    <div class="key-box">
      <label>your name</label>
      <input type="text" id="name-input" placeholder="enter your name…" maxlength="24" autocomplete="off" />
      <label>secret key</label>
      <input type="password" id="key-input" placeholder="paste the key here…" autocomplete="off" />
      <button id="gate-btn">enter ✦</button>
      <div id="gate-error"></div>
    </div>
    <div class="gate-footer">end-to-end encrypted · just the two of you</div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="header-orb">🕯</div>
        <div>
          <div class="header-name">our little corner</div>
          <div class="header-status" id="conn-status">connecting…</div>
        </div>
      </div>
      <div class="header-right">
        <span id="typing-indicator"></span>
        <span class="logout-btn" id="logout-btn">leave ✦</span>
      </div>
    </div>

    <div class="branch-divider">
      <div class="branch-line"></div>
      <span>🌲 ✦ 🌲</span>
      <div class="branch-line"></div>
    </div>

    <div id="messages">
      <div class="empty-state" id="empty-state">
        <div class="snowflake-big">❄</div>
        <div>say hello when you're ready…</div>
      </div>
    </div>

    <div class="chat-footer">
      <textarea id="msg-input" rows="1" placeholder="write something warm…"></textarea>
      <button id="send-btn" title="send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- Firebase -->
<script type="module" src="app.js"></script>
</body>
</html>
